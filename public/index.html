<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a; color: #ededed; height: 100vh;
      display: flex; flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem; border-bottom: 1px solid #1a1a1a;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header p { color: #555; font-size: 0.8125rem; margin-top: 0.25rem; }
    .messages {
      flex: 1; overflow-y: auto; padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .message {
      max-width: 75%; padding: 0.75rem 1rem;
      border-radius: 0.75rem; font-size: 0.9375rem; line-height: 1.5;
      white-space: pre-wrap;
    }
    .message.user {
      align-self: flex-end; background: #2563eb; color: white;
    }
    .message.assistant {
      align-self: flex-start; background: #1a1a1a; color: #ededed;
    }
    .message.error {
      align-self: center; background: #371717; color: #fca5a5;
      font-size: 0.8125rem;
    }
    .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #555; font-size: 0.9375rem;
    }
    .input-area {
      padding: 1rem 1.5rem; border-top: 1px solid #1a1a1a;
      display: flex; gap: 0.5rem;
    }
    .input-area input {
      flex: 1; padding: 0.75rem 1rem; background: #1a1a1a;
      border: 1px solid #333; border-radius: 0.5rem; color: #ededed;
      font-size: 0.9375rem; outline: none;
    }
    .input-area input:focus { border-color: #555; }
    .input-area input::placeholder { color: #555; }
    .input-area button {
      padding: 0.75rem 1.5rem; background: #ededed; color: #0a0a0a;
      border: none; border-radius: 0.5rem; font-size: 0.9375rem;
      font-weight: 500; cursor: pointer;
    }
    .input-area button:hover { background: #d4d4d4; }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .typing { color: #555; font-style: italic; padding: 0.5rem 0; }
  </style>
</head>
<body>
  <header>
    <h1>AI Chatbot</h1>
    <p>Powered by GPT-4o-mini</p>
  </header>
  <div id="root"></div>

  <script src="https://unpkg.com/react@19/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@19/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const messagesEnd = useRef(null);

      useEffect(() => {
        messagesEnd.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      async function sendMessage(e) {
        e.preventDefault();
        if (!input.trim() || loading) return;

        const userMessage = { role: 'user', content: input.trim() };
        const newMessages = [...messages, userMessage];
        setMessages(newMessages);
        setInput('');
        setLoading(true);

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: newMessages })
          });

          if (!res.ok) throw new Error('Failed to get response');
          const data = await res.json();
          setMessages([...newMessages, data.message]);
        } catch (err) {
          setMessages([...newMessages, { role: 'error', content: 'Failed to get response. Check your API key.' }]);
        } finally {
          setLoading(false);
        }
      }

      return (
        <>
          <div className="messages">
            {messages.length === 0 ? (
              <div className="empty-state">Send a message to start chatting</div>
            ) : (
              messages.map((msg, i) => (
                <div key={i} className={`message ${msg.role}`}>
                  {msg.content}
                </div>
              ))
            )}
            {loading && <div className="typing">Thinking...</div>}
            <div ref={messagesEnd} />
          </div>
          <form className="input-area" onSubmit={sendMessage}>
            <input
              type="text"
              value={input}
              onChange={(e) => setInput(e.target.value)}
              placeholder="Type a message..."
              disabled={loading}
            />
            <button type="submit" disabled={loading || !input.trim()}>
              Send
            </button>
          </form>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
